<div class="overlay overlay-options">
	<div class="menu menu-options">
		<div class="scrollbox-top"></div>
		<div class="scrollbox-bottom"></div>
		<div class="content">
			<div class="title"></div>
			<div class="options">
				<div class="option keybinds">
					<div class="option-title"></div>
					<div class="option-name forward"></div>
					<div class="option-name backward"></div>
					<div class="option-name left"></div>
					<div class="option-name right"></div>
					<div class="option-name console"></div>
					<div class="blank"></div>
				</div>
				<div class="option display">
					<div class="option-title"></div>
					<div class="option-name borders"></div>
					<div class="option-name animations"></div>
					<div class="blank"></div>
				</div>
				<div class="option audio">
					<div class="option-title"></div>
					<div class="option-name music"></div>
					<div class="option-name music_volume"></div>
					<div class="option-name sound"></div>
					<div class="option-name sound_volume"></div>
					<div class="blank"></div>
				</div>
				<div class="option saves">
					<div class="option-title"></div>
					<div class="option-name advanced"></div>
					<div class="blank"></div>
				</div>
				<div class="option lang">
					<div class="option-title"></div>
					<div class="option-name en_US" onclick="Game.lang('en_US')"></div>
					<div class="option-name es_ES" onclick="Game.lang('es_ES')"></div>
					<div class="option-name fr_FR" onclick="Game.lang('fr_FR')"></div>
					<div class="blank"></div>
				</div>
				<div class="option about">
					<div class="option-title"></div>
					<div class="option-name updates"></div>
					<div class="option-name credits"></div>
				</div>
			</div>
			<div class="actions">
				<div class="btn" data-function="close" data-target="options">Close</div>
			</div>
		</div>
	</div>
</div>
