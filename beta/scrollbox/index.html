<!DOCTYPE html>

<html>

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1">
		<style type="text/css">
			body {
				margin: 0;
				background-color: #333
			}

			.overlay {
				display: none;
				align-items: center;
				justify-content: center;
				width: 100%;
				height: 100%;
				margin: auto;
				top: 0;
				bottom: 0;
				left: 0;
				right: 0;
				position: absolute;
				background-color: rgba(0, 0, 0, 0.75)
			}

			.box {
				display: flex;
				flex-direction: column;
				justify-content: center;
				width: 960px;
				height: 540px;
				position: relative
			}

			.box_top {
				height: 36px;
				position: relative;
				background-image: url(box_top.png);
				background-repeat: no-repeat;
				background-size: 100%;
				image-rendering: crisp-edges;
				animation: box_open 0.2s linear
			}

			.box_bottom {
				height: 36px;
				position: relative;
				background-image: url(box_bottom.png);
				background-repeat: no-repeat;
				background-size: 100%;
				image-rendering: crisp-edges;
				transform: rotateZ(180deg);
				animation: box_open 0.2s linear
			}

			.title {
				display: block;
				height: 40px;
				line-height: 40px;
				font-size: 25px;
				z-index: 1
			}

			.options {
				background-color: grey
			}

			.option-title {
				height: 30px;
				line-height: 30px;
				top: 0;
				position: sticky;
				background-color: inherit;
				font-size: 20px
			}

			.option-name {
				height: 30px;
				line-height: 30px;
				font-size: 20px
			}

			.options {
				height: calc(100% - 80px);
				overflow-y: scroll;
				background-color: rgba(0, 0, 0, 0.2)
			}

			.actions {
				height: 40px;
				line-height: 40px
			}

			content {
				display: none;
				width: 90%;
				height: 80%;
				margin: auto;
				top: 0;
				bottom: 0;
				left: 0;
				right: 0;
				position: absolute
			}

			@keyframes box_open {
				from {height: 36px}
				to {height: 50%}
			}

			@keyframes box_close {
				from {height: 50%}
				to {height: 36px}
			}

			@media screen and (max-width: 1200px) {
				.box {
					width: 80vw;
					height: 45vw
				}
			}
		</style>
		<script type="text/javascript">
			window.onload = function() {
				var overlay = document.querySelector(".overlay"),
					box = document.querySelector(".box"),
					box_top = document.querySelector(".box_top"),
					box_bottom = document.querySelector(".box_bottom"),
					content = document.querySelector("content");

				document.querySelector("#open").onclick = open_box;

				function open_box() {
					overlay.style.display = "flex";
					box_top.style.animationName = "box_open";
					box_bottom.style.animationName = "box_open";
					box_top.style.height = "50%";
					box_bottom.style.height = "50%";
					setTimeout(function() {content.style.display = "block"}, 200)
				}

				document.querySelector("#close").onclick = close_box;

				function close_box() {
					content.style.display = "none";
					box_top.style.animationName = "box_close";
					box_bottom.style.animationName = "box_close";
					box_top.style.height = "36px";
					box_bottom.style.height = "36px";
					setTimeout(function() {overlay.style.display = "none"}, 200)
				}

				open_box()
			}
		</script>
		<title>Scrollbox</title>
	</head>

	<body>
		<button id="open">Open</button>
		<section class="overlay">
			<section class="box">
				<div class="box_top"></div>
				<div class="box_bottom"></div>
				<content>
					<div class="title">Options</div>
					<div class="options">
						<div class="option">
							<div class="option-title">Contrôles</div>
							<div class="option-name">Avancer</div>
							<div class="option-name">Reculer</div>
							<div class="option-name">Tourner à gauche</div>
							<div class="option-name">Tourner à droite</div>
							<div class="option-name">Console</div>
						</div>
						<div class="option">
							<div class="option-title">Affichage</div>
							<div class="option-name">Bordures d'écran</div>
							<div class="option-name">Animations</div>
						</div>
						<div class="option">
							<div class="option-title">Audio</div>
							<div class="option-name">Musique</div>
							<div class="option-name">Volume de la musique</div>
							<div class="option-name">sons</div>
							<div class="option-name">Volume des sons</div>
						</div>
						<div class="option">
							<div class="option-title">Sauvegardes</div>
							<div class="option-name">Options avancées des sauvegardes</div>
						</div>
						<div class="option">
							<div class="option-title">Langage</div>
							<div class="option-name">Anglais</div>
							<div class="option-name">Français</div>
						</div>
						<div class="option">
							<div class="option-title">A propos</div>
							<div class="option-name">A propos</div>
						</div>
					</div>
					<div class="actions">
						<button id="close">Close</button>
					</div>
				</content>
			</section>
		</section>
	</body>

</html>
